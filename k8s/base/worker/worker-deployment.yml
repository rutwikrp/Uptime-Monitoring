apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-worker
  namespace: uptime-monitor
  labels:
    app: uptime-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uptime-worker
  template:
    metadata:
      labels:
        app: uptime-worker
    spec:
      # spread workers across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: uptime-worker
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: worker
          image: rutwikrp/uptime-worker
          imagePullPolicy: IfNotPresent
          # run the worker loop
          command: ["node", "worker/worker.js"]
          envFrom:
            - secretRef:
                name: uptime-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      restartPolicy: Always
