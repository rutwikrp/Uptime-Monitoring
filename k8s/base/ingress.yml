apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-ingress
  namespace: uptime-monitor
  annotations:
    # Example for nginx ingress controller; adjust if you're using another controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  tls:
    - hosts:
        - uptime.example.com                   # <-- replace with your host
      secretName: uptime-tls                    # TLS secret (create via cert-manager or kubectl)
  rules:
    - host: uptime.example.com                 # <-- replace with your host
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uptime-api
                port:
                  number: 80
