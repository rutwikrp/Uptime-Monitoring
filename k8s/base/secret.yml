apiVersion: v1
kind: Secret
metadata:
  name: uptime-secrets
  namespace: uptime-monitor
type: Opaque
stringData:
  # DB connection pieces (preferred) - adjust values for your environment
  DB_HOST: "postgres"                     # service name for Postgres in-cluster
  DB_PORT: "5432"
  DB_NAME: "uptime_monitor"
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"                 # change for non-dev
  # Optional: put app-specific secrets here
  JWT_SECRET: "dDBwRXZKanlZaWgyVU9sRlJ4QW1MTA=="
  # You can instead store a full DATABASE_URL if you prefer:
  # DATABASE_URL: "postgres://postgres:postgres@postgres:5432/uptime_monitor"
