apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: uptime-monitor
  labels:
    app: postgres
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: uptime-secrets
                  key: DB_USER          # change to POSTGRES_USER if your secret uses that key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-secrets
                  key: DB_PASSWORD      # change to POSTGRES_PASSWORD if different
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: uptime-secrets
                  key: DB_NAME          # change to POSTGRES_DB if different
            # Expose PGPASSWORD so pg_isready can use it
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: ""
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h localhost -p 5432"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h localhost -p 5432"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      securityContext:
        fsGroup: 999
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        # Optionally set a specific storage class name for your cluster:
        # storageClassName: standard-ssd
