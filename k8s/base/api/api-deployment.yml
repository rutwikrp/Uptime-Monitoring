apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-api
  namespace: uptime-monitor
  labels:
    app: uptime-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uptime-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: uptime-api
    spec:
      # run as non-root (adjust if your image uses another UID)
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          # Replace this with your registry image & tag (use immutable tag in prod)
          image: rutwikrp/uptime-monitoring-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: uptime-secrets
          env:
            - name: PORT
              value: "3000"
            # Optionally derive DATABASE_URL here if you prefer
            - name: DATABASE_URL
              value: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # Logging to stdout; no volume mounts required for app code in images
      imagePullSecrets: []   # add imagePullSecrets if using private registry
