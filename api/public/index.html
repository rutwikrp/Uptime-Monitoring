<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Uptime Monitor</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Uptime Monitor</h1>

    <!-- Note: button is type="button" to avoid native form submit navigation -->
    <form id="addForm" class="form" onsubmit="return false;">
      <input id="name" placeholder="Name (optional)" />
      <input id="url" placeholder="https://example.com" required />
      <input id="interval" placeholder="Interval (s, default 60)" />
      <button id="addBtn" type="button">Add URL</button>
    </form>

    <table id="monitors">
      <thead>
        <tr><th>ID</th><th>Name</th><th>URL</th><th>Status</th><th>Last checked</th><th>RT(ms)</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- load script at the end so DOM exists -->
  <script src="/main.js"></script>
</body>
</html>
